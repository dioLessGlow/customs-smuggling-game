<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:,">
  <title>缉私十二时辰 · 反走私周期</title>
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0e1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    }

    #app {
      width: 390px; height: 844px;
      position: absolute;
      transform-origin: top left;
      z-index: 1;
    }

    #phaser-container {
      position: absolute; inset: 0;
      display: none;
    }
    #phaser-container canvas { display: block; }

    /* ===== 通用屏幕 ===== */
    .screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    .btn-back {
      position: absolute; top: 14px; left: 14px;
      font-size: 14px; color: #94a3b8; cursor: pointer; z-index: 5;
      background: none; border: none; font-family: inherit;
    }
    .btn-back:hover { color: #e2e8f0; }

    .screen-title {
      text-align: center;
      font-size: 22px; font-weight: 900;
      color: #ffd700; font-family: 'Arial Black', sans-serif;
      padding-top: 46px; padding-bottom: 4px;
    }

    /* ===== BOOT ===== */
    #screen-boot { align-items:center; justify-content:center; gap:8px; }
    #screen-boot .title {
      font-size: 26px; font-weight: 900;
      color: #4ecca3; font-family: 'Arial Black', sans-serif;
      animation: pulse 1.2s ease-in-out infinite;
    }
    #screen-boot .sub { font-size: 12px; color: #475569; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ===== MENU ===== */
    #screen-menu { align-items:center; padding-top:48px; }
    #screen-menu .game-title {
      font-size: 38px; font-weight: 900;
      color: #ffd700; font-family: 'Arial Black', sans-serif;
      text-shadow: 0 2px 0 #b8860b;
    }
    #screen-menu .game-sub { font-size: 11px; color: #94a3b8; margin-top:4px; }
    #screen-menu .game-info {
      font-size: 12px; color: #4ecca3; font-family: monospace;
      margin-top:10px;
    }

    .menu-cards {
      display: flex; flex-direction: column; gap:12px;
      width: 320px; margin-top:18px;
    }
    .menu-card {
      display: flex; flex-direction: column; align-items: center; gap:2px;
      padding: 12px 0;
      border-radius: 8px; cursor: pointer;
      border: 2px solid;
      transition: background 0.1s, transform 0.1s;
    }
    .menu-card:hover { background:#2a3a4b; transform:scale(1.03); }
    .menu-card-icon { font-size: 22px; }
    .menu-card-title { font-size: 15px; font-weight: 900; color:#fff; font-family:'Arial Black',sans-serif; }
    .menu-card-sub { font-size: 9px; color:#fff; }

    .menu-bottom {
      display: flex; gap: 60px;
      margin-top: auto; margin-bottom: 24px;
      justify-content: center;
    }
    .menu-bottom-btn {
      font-size: 13px; color: #fff; cursor: pointer; background:none; border:none; font-family:inherit;
    }
    .menu-bottom-btn:hover { color:#e2e8f0; }

    /* ===== LEVEL SELECT (MAP) ===== */
    #screen-level-select {
      padding: 0;
      background: #f0e6d6; z-index: 2;
    }
    #screen-level-select .btn-back {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      font-size: 12px; color: #94a3b8; cursor: pointer; background:none; border:none; font-family:inherit;
    }
    #screen-level-select .btn-back:hover { color:#e2e8f0; }
    #screen-archive { padding-top: 16px; }
    #level-filter-bar {
      position: absolute; top: 115px; left: 0; right: 0; z-index: 10;
      display: flex; gap: 2px; padding: 2px 4px;
      justify-content: center; align-items: center;
    }
    #map-container {
      position: absolute; inset: 0;
      padding-bottom: 40px;
    }

    /* ===== RESULT ===== */
    #screen-result { align-items:center; padding-top:30px; gap:4px; }
    .result-title { font-size: 32px; font-weight: 900; font-family:'Arial Black',sans-serif; }
    .result-stars { font-size: 26px; margin:4px 0; }
    .result-stats {
      display: flex; flex-direction: column; gap:6px;
      width: 260px; margin: 6px 0 10px;
    }
    .result-stat {
      display: flex; justify-content: space-between;
      font-size: 14px; padding: 0 10px;
    }
    .result-stat-label { color:#94a3b8; }
    .result-stat-value { font-weight: 900; font-family:'Arial Black',sans-serif; }
    .result-echo { font-size: 11px; color:#ffd700; margin:4px 0; }

    .result-btns {
      display: flex; gap: 20px; margin-top: auto;
      margin-bottom: 40px;
    }
    .result-btn {
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 900; font-family:'Arial Black',sans-serif;
      color: #fff; border: none;
    }
    .result-btn:hover { filter: brightness(1.2); }

    /* ===== FRAGMENT OVERLAY ===== */
    #frag-overlay {
      display: none; position: absolute; inset:0; z-index:20;
      align-items:center; justify-content:center;
      background: rgba(0,0,0,0.6); cursor: pointer;
    }
    #frag-overlay .frag-card {
      width: 320px; padding: 20px; border-radius: 8px;
      background: #1e293b; border: 2px solid #ffd700;
      text-align: center;
    }
    #frag-overlay .frag-card h3 {
      font-size: 16px; color:#ffd700; font-weight:900; font-family:'Arial Black',sans-serif;
      margin-bottom:10px;
    }
    #frag-overlay .frag-card p { font-size: 13px; color:#e2e8f0; line-height:1.6; }
    #frag-overlay .frag-card .hint { font-size: 10px; color:#64748b; margin-top:12px; }

    /* ===== CYCLE SUMMARY ===== */
    #screen-cycle-summary { align-items:center; padding-top:30px; gap:4px; }
    .cs-title { font-size: 22px; font-weight: 900; font-family:'Arial Black',sans-serif; text-align:center; }
    .cs-passrate { font-size: 13px; font-weight:900; font-family:'Arial Black',sans-serif; text-align:center; margin-bottom:4px; }
    .cs-card {
      width: 310px; padding:14px; margin:4px 0; border-radius:8px;
      background:#1e293b; border:1px solid #475569;
    }
    .cs-card-title { font-size:11px; color:#94a3b8; margin-bottom:6px; }
    .cs-info { font-size: 12px; color:#94a3b8; text-align:center; line-height:1.8; }
    .cs-dao { font-size: 13px; color:#ffd700; font-family:monospace; }
    .cs-echo-card {
      display:flex; align-items:center; gap:10px; padding:10px; margin:6px 0;
      background:#2a1a3b; border:1px solid #ea80fc; border-radius:6px;
    }
    .cs-echo-icon { font-size:28px; }
    .cs-echo-name { font-size:13px; color:#ea80fc; font-weight:900; }
    .cs-echo-desc { font-size:10px; color:#94a3b8; }
    .cs-btn {
      margin-top: auto; margin-bottom: 40px;
      padding: 12px 40px; border-radius: 6px; cursor: pointer;
      font-size: 16px; font-weight: 900; font-family:'Arial Black',sans-serif;
      color: #fff; border: none;
    }
    .cs-btn:hover { filter: brightness(1.2); }

    /* ===== ARCHIVE ===== */
    #screen-archive { padding-top: 16px; }
    #archive-content { padding: 0 8px 20px; flex:1; overflow-y:auto; }
    .archive-tabs { display:flex; gap:2px; padding:0 8px; margin-bottom:6px; }
    .archive-tab {
      flex:1; padding:8px 0; text-align:center; font-size:13px; font-weight:900; color:#94a3b8;
      border:none; background:#1e293b; border-radius:6px 6px 0 0; cursor:pointer; font-family:inherit;
    }
    .archive-tab.active { color:#ffd700; background:#334155; }
    .archive-stats {
      display:flex; justify-content:space-around; padding:6px 8px; margin:0 8px 6px;
      background:#1e293b; border-radius:6px; font-size:10px; color:#94a3b8; font-family:monospace;
    }
    .archive-total { font-size: 11px; color:#94a3b8; font-family:monospace; text-align:center; margin:8px 0 4px; }
    .archive-group-title { font-size: 11px; color:#e2e8f0; font-family:monospace; margin:6px 0 2px; }
    .archive-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap:4px; }
    .archive-item {
      display: flex; flex-direction: column; align-items: center;
      background: #1e293b; border: 1px solid #475569; border-radius: 4px;
      padding: 4px 0; min-height: 40px; cursor:pointer; transition:transform 0.1s;
    }
    .archive-item:active { transform:scale(0.95); }
    .archive-item.illegal { background:#441111; border-color:#ff4444; }
    .archive-icon { font-size: 18px; }
    .archive-tag { font-size: 9px; }
    .archive-echos { display: flex; gap: 8px; flex-wrap: wrap; justify-content:center; }
    .archive-echo {
      display: flex; flex-direction: column; align-items: center; gap:2px;
      padding:8px 12px; background:#1e293b; border:1px solid #475569; border-radius:6px; cursor:pointer;
    }
    .archive-echo:active { transform:scale(0.95); }
    .archive-frag {
      display: flex; justify-content: space-between;
      font-size: 11px; color:#e2e8f0; padding:4px 0;
    }
    .archive-tutor-grid { display:flex; flex-direction:column; gap:4px; }
    .archive-tutor-row {
      display:flex; align-items:center; gap:8px; padding:8px; background:#1e293b;
      border:1px solid #475569; border-radius:6px; cursor:pointer;
    }
    .archive-tutor-row:active { transform:scale(0.98); }
    .archive-tutor-icon { font-size:22px; }
    .archive-tutor-name { font-size:13px; color:#e2e8f0; font-weight:900; flex:1; }
    .archive-tutor-bar-bg { width:80px; height:6px; background:#0a0e1a; border-radius:3px; overflow:hidden; }
    .archive-tutor-bar-fill { height:100%; background:#4ecca3; border-radius:3px; transition:width 0.3s; }
    .archive-tutor-aff { font-size:10px; color:#94a3b8; font-family:monospace; min-width:30px; text-align:right; }

    /* Detail modal */
    #archive-modal {
      display:none; position:absolute; inset:0; z-index:20;
      background:rgba(0,0,0,0.75); justify-content:center; align-items:center;
    }
    #archive-modal.show { display:flex; }
    .archive-modal-box {
      max-width:320px; width:85%; max-height:90%; padding:20px; border-radius:10px;
      background:#1e293b; border:2px solid #475569; position:relative; overflow-y:auto;
    }
    .archive-modal-close {
      position:absolute; top:8px; right:10px; font-size:18px; color:#94a3b8; cursor:pointer; background:none; border:none; font-family:inherit;
    }
    .archive-modal-icon { font-size:36px; text-align:center; margin-bottom:6px; }
    .archive-modal-name { font-size:16px; color:#ffd700; font-weight:900; text-align:center; }
    .archive-modal-detail { font-size:11px; color:#94a3b8; text-align:center; margin:4px 0 8px; }
    .archive-modal-desc { font-size:11px; color:#e2e8f0; line-height:1.7; text-align:center; white-space:pre-line; }
    .ae-section { margin:0 0 5px; padding:5px 8px; background:rgba(255,255,255,0.04); border-radius:4px; }
    .ae-section:last-of-type { margin-bottom:0; }
    .ae-label { font-size:10px; color:#94a3b8; font-weight:700; margin-bottom:2px; }
    .ae-text { font-size:10.5px; color:#e2e8f0; line-height:1.65; text-align:left; white-space:pre-wrap; }

    /* ===== FLIP CARD ===== */
    .flip-card-wrap {
      width: 270px; height: 380px; margin: 6px auto;
      perspective: 2000px;
    }
    .flip-card {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .flip-card.open {
      transform: rotate(8deg) scale(1.08);
    }
    .flip-card .front {
      position: absolute; inset: 0;
      background: #e0e1dc; border-radius: 4px;
      transform-origin: left;
      transition: 0.7s; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #013243;
    }
    .flip-card .front:before {
      content: ''; position: absolute; top: -5px; left: 0; width: 100%; height: 5px;
      background: #BAC1BA; transform-origin: bottom; transform: skewX(-45deg); z-index: 10;
    }
    .flip-card .front:after {
      content: ''; position: absolute; top: 0; right: -5px; width: 5px; height: 100%;
      background: #92A29C; transform-origin: left; transform: skewY(-45deg); z-index: 10;
    }
    .flip-card.open .front {
      transform: rotateY(-135deg);
    }
    .flip-card.open .front .front-icon,
    .flip-card.open .front .front-name,
    .flip-card.open .front .front-hint {
      opacity: 0 !important;
      animation: none !important;
    }
    .flip-card .front-icon {
      font-size: 60px; margin-bottom: 10px;
    }
    .flip-card .front-name {
      font-size: 28px; font-weight: 900; color: #1BBC9B;
    }
    .flip-card .front-hint {
      margin-top: 16px; font-size: 16px; color: #C0392B; opacity: 0.7;
      animation: fpulse 2s infinite; pointer-events: none;
    }
    @keyframes fpulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.05); }
    }
    .flip-card .inner {
      position: absolute; inset: 0; border-radius: 4px;
      background: #1e293b; border: 2px solid #4ecca3;
      padding: 12px 10px; overflow-y: auto; z-index: 1;
      display: flex; flex-direction: column; gap: 3px;
    }
    .flip-card .inner .fc-title {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px;
    }
    .flip-card .inner .fc-title h4 {
      font-size: 20px; font-weight: 900; color: #ffd700; margin: 0;
    }
    .flip-card .inner .fc-badge {
      font-size: 9px; background: #C0392B; color: #fff; padding: 1px 5px; border-radius: 3px;
    }
    .flip-card .inner .fc-meta {
      font-size: 9px; color: #94a3b8; border-bottom: 1px dashed #475569; padding-bottom: 4px; margin-bottom: 2px;
    }
    .flip-card .inner .fc-sec {
      margin: 0;
    }
    .flip-card .inner .fc-sec-title {
      font-size: 10px; font-weight: 700; color: #94a3b8;
    }
    .flip-card .inner .fc-sec p {
      font-size: 9.5px; line-height: 1.4; color: #e2e8f0; margin: 1px 0 2px 3px;
    }
    .flip-card .inner .fc-tag {
      margin-top: auto; text-align: right; font-size: 9px; color: #64748b; padding-top: 2px;
    }

    /* ===== SETTINGS ===== */
    #screen-settings { padding-top:16px; }
    #settings-nav { display:flex; flex-wrap:wrap; gap:4px; padding:0 8px; margin-bottom:6px; }
    .settings-nav-btn {
      padding:6px 10px; font-size:11px; font-weight:900; color:#94a3b8;
      border:none; background:#1e293b; border-radius:4px; cursor:pointer; font-family:inherit; transition:0.1s;
    }
    .settings-nav-btn.active { color:#ffd700; background:#334155; }
    #settings-content { padding:0 8px 20px; flex:1; overflow-y:auto; }
    #settings-content .section-title { font-size:13px; color:#ffd700; font-weight:900; margin-bottom:8px; }
    .set-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 0; border-bottom:1px solid #1e293b;
    }
    .set-label { font-size:12px; color:#e2e8f0; flex:1; }
    .set-desc { font-size:9px; color:#64748b; display:block; }
    .toggle { position:relative; cursor:pointer; flex-shrink:0; }
    .toggle-bg {
      width: 28px; height: 14px; border-radius: 7px; background:#475569; transition: 0.2s;
    }
    .toggle-knob {
      position: absolute; top: 2px; width: 10px; height: 10px; border-radius: 50%;
      background: #fff; transition: 0.2s;
    }
    .set-slider-row { display:flex; align-items:center; gap:8px; }
    .set-slider { flex:1; height:4px; -webkit-appearance:none; appearance:none; background:#334155; border-radius:2px; outline:none; }
    .set-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#4ecca3; cursor:pointer; }
    .set-val { font-size:10px; color:#94a3b8; font-family:monospace; min-width:20px; text-align:right; }
    .set-radio-group { display:flex; gap:6px; flex-wrap:wrap; }
    .set-radio {
      padding:4px 10px; font-size:10px; font-weight:900; color:#94a3b8;
      background:#1e293b; border:1px solid #475569; border-radius:4px; cursor:pointer; font-family:inherit;
    }
    .set-radio.active { color:#ffd700; border-color:#ffd700; background:#334155; }
    .set-btn {
      padding:6px 14px; font-size:11px; font-weight:900; color:#fff;
      background:#e94560; border:none; border-radius:4px; cursor:pointer; font-family:inherit;
    }
    .set-stat-row { display:flex; justify-content:space-between; font-size:10px; color:#94a3b8; padding:4px 0; font-family:monospace; }
    .set-stat-val { color:#e2e8f0; }
    .set-help-block { font-size:10px; color:#94a3b8; line-height:1.7; margin:4px 0; }
    #reset-overlay {
      display: none; position: absolute; inset:0; z-index:20;
      align-items:center; justify-content:center;
      background: rgba(0,0,0,0.7);
    }
    .reset-card {
      width: 280px; padding: 20px; border-radius: 8px;
      background: #1e293b; border: 2px solid #ff4444;
      text-align: center;
    }
    .reset-card h3 { font-size: 18px; color:#ff4444; font-weight:900; font-family:'Arial Black',sans-serif; }
    .reset-card p { font-size: 11px; color:#94a3b8; margin:8px 0; }
    .reset-btns { display: flex; gap: 20px; justify-content: center; margin-top:12px; }
    .reset-btn { padding: 8px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight:900; font-family:'Arial Black',sans-serif; color:#fff; border:none; }
    .reset-btn:hover { filter:brightness(1.2); }

    /* ===== CHARACTER SELECT HSR STYLE ===== */
    #screen-character-select { padding-top: 60px; overflow-y: auto; }
    .cs-header { display:flex; align-items:center; gap:8px; padding:0 10px 6px; }
    .cs-header-icon { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#0d2a50,#1a3a6a); border:1px solid #2a6aaa; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .cs-header-sub { font-size:9px; color:#4ab3e0; letter-spacing:1px; text-transform:uppercase; margin:0; }
    .cs-header-title { font-size:18px; font-weight:900; color:#e8f4ff; font-family:'Arial Black',sans-serif; margin:0; }

    #cs-selector { display:flex; gap:6px; padding:0 10px 8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    #cs-selector::-webkit-scrollbar { display:none; }
    .cs-avatar { display:flex; flex-direction:column; align-items:center; cursor:pointer; padding:4px 6px; border-radius:6px; border:2px solid transparent; transition:all 0.15s; min-width:44px; flex-shrink:0; }
    .cs-avatar.active { border-color:#4ab3e0; background:rgba(74,179,224,0.1); }
    .cs-avatar-circle { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; background:rgba(10,20,45,0.6); border:2px solid rgba(30,74,138,0.4); transition:all 0.15s; }
    .cs-avatar.active .cs-avatar-circle { border-color:#4ab3e0; box-shadow:0 0 8px rgba(74,179,224,0.3); }
    .cs-avatar-name { font-size:9px; color:#5a8ab0; margin-top:2px; font-weight:600; }
    .cs-avatar.active .cs-avatar-name { color:#e8f4ff; }

    #cs-body { padding:0 8px 16px; display:flex; flex-direction:column; gap:8px; }
    .cs-event-card { background:linear-gradient(135deg,#0f1a30,#0a1628); border:1px solid rgba(30,74,138,0.3); border-radius:8px; overflow:hidden; transition:opacity 0.18s ease; }
    .cs-switching { opacity:0; pointer-events:none; }
    .cs-card-header { display:flex; padding:10px; gap:10px; }
    .cs-card-img { width:80px; min-width:80px; height:80px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:32px; position:relative; flex-shrink:0; }
    .cs-card-img .cs-emoji { font-size:32px; }
    .cs-card-info { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
    .cs-name-row { display:flex; align-items:baseline; gap:6px; margin-bottom:4px; flex-wrap:wrap; }
    .cs-name { font-size:16px; font-weight:700; color:#e8f4ff; }
    .cs-title-tag { font-size:10px; color:#4ab3e0; font-weight:600; letter-spacing:1px; }
    .cs-tags { display:flex; gap:4px; margin-bottom:6px; flex-wrap:wrap; }
    .cs-tag { font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:1px 5px; border-radius:3px; }
    .cs-tag-field { background:rgba(74,60,180,0.3); color:#a090ff; border:1px solid rgba(100,80,220,0.4); }
    .cs-tag-trait { background:rgba(180,120,0,0.2); color:#f0c040; border:1px solid rgba(200,150,0,0.3); }
    .cs-stats { display:flex; gap:6px; flex-wrap:wrap; }
    .cs-stat { display:flex; flex-direction:column; min-width:50px; flex:1; }
    .cs-stat-label { font-size:8px; color:#3a6aaa; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:1px; }
    .cs-stat-bar-wrap { display:flex; align-items:center; gap:4px; }
    .cs-stat-bar { flex:1; height:3px; background:rgba(30,60,120,0.5); border-radius:2px; overflow:hidden; min-width:30px; }
    .cs-stat-bar-fill { height:100%; border-radius:2px; }
    .cs-stat-val { font-size:9px; font-weight:700; color:#a8d0f0; min-width:16px; }
    .cs-desc { font-size:11px; color:#5a8ab0; line-height:1.5; padding:8px 10px; border-top:1px solid rgba(30,74,138,0.3); background:rgba(8,18,40,0.3); min-height:66px; }
    .cs-action { padding:0 10px 10px; }
    .cs-btn { width:100%; padding:8px 0; background:linear-gradient(135deg,#e8930a,#d47800); color:#fff; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; border:none; border-radius:6px; cursor:pointer; transition:all 0.16s; font-family:inherit; }
    .cs-btn:hover { transform:scale(1.02); box-shadow:0 4px 16px rgba(230,140,0,0.35); }
    .cs-btn:active { transform:scale(0.98); }

    .cs-dev-body { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
    .cs-dev-row { display:flex; gap:12px; flex-wrap:wrap; }
    .cs-dev-label { font-size:8px; color:#3a6aaa; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
    .cs-dev-value { font-size:11px; color:#a8d0f0; font-weight:600; }
    .cs-pips { display:flex; gap:3px; }
    .cs-pip { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; }
    .cs-pip.done { border:1.5px solid #00d4a0; background:rgba(0,180,130,0.25); color:#00d4a0; }
    .cs-pip.todo { border:1.5px solid #1e4a8a; background:rgba(10,20,45,0.6); color:#2a5aaa; }
    .cs-prog-wrap { width:100%; }
    .cs-prog-track { height:5px; background:rgba(30,60,120,0.4); border-radius:3px; overflow:hidden; }
    .cs-prog-fill { height:100%; background:linear-gradient(90deg,#00d4a0,#4ab3e0); border-radius:3px; transition:width 0.6s ease; }
    .cs-prog-labels { display:flex; justify-content:space-between; margin-top:3px; }
    .cs-prog-label { font-size:8px; color:#3a6aaa; }
    .cs-prog-label.center { color:#4ab3e0; font-weight:700; }

    /* ===== SHOP ===== */
    #screen-shop { padding-top: 24px; }
    .shop-dao { text-align:center; font-size: 12px; color:#ffd700; font-family:monospace; margin-bottom:4px; }

    /* SHOP TABS */
    .shop-tabs { display:flex; gap:2px; padding:0 10px; margin-bottom:4px; }
    .shop-tab { flex:1; text-align:center; padding:6px 0; font-size:12px; font-weight:900; color:#94a3b8; cursor:pointer; border-radius:4px 4px 0 0; background:#0f172a; }
    .shop-tab.active { color:#fff; background:#1e293b; border-bottom:2px solid #4ecca3; }

    /* SHOP SUB TABS (knowledge tutors) */
    .shop-sub-tabs { display:flex; gap:3px; padding:0 10px; margin-bottom:4px; flex-wrap:wrap; }
    .shop-sub-tab {
      padding:4px 8px; font-size:10px; font-weight:900; color:#94a3b8;
      border:none; background:#1e293b; border-radius:4px; cursor:pointer; font-family:inherit;
    }
    .shop-sub-tab.active { color:#ffd700; background:#334155; }

    /* SHOP GRID */
    #shop-list {
      display: grid; grid-template-columns: 1fr 1fr; gap:6px;
      padding: 0 10px 20px;
    }
    .shop-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px; border-radius: 6px; min-height: 100px;
      background: #1e293b; border: 1px solid #475569; position:relative; text-align:center;
      transition: transform 0.1s;
    }
    .shop-card:active { transform:scale(0.97); }
    .shop-card.can-buy { cursor:pointer; border-color:#4ecca3; }
    .shop-card.can-buy:hover { filter:brightness(1.2); }
    .shop-card.owned { border-color:#ffd700; background:#1a2a1a; }
    .shop-card.insufficient { opacity:0.6; }
    .shop-card.locked { opacity:0.5; }
    .shop-card-icon { font-size: 22px; margin-bottom:2px; }
    .shop-card-name { font-size: 11px; font-weight:900; color:#fff; font-family:'Arial Black',sans-serif; line-height:1.3; }
    .shop-card-desc { font-size: 8px; color:#94a3b8; line-height:1.3; margin:2px 0; }
    .shop-card-footer { margin-top:auto; width:100%; padding-top:4px; border-top:1px solid #334155; }
    .shop-card-price { font-size: 10px; color:#ffd700; font-family:monospace; }
    .shop-card-status { font-size: 9px; font-weight:900; margin-top:2px; }
    .shop-card-status.owned { color:#4ecca3; }
    .shop-card-status.upgrade { color:#ffd700; }
    .shop-card-status.insufficient { color:#ff4444; }
    .shop-card-status.locked { color:#64748b; }

    /* KNOWLEDGE QUIZ */
    .quiz-q { margin-bottom:14px; }
    .quiz-q-text { font-size:13px; color:#fff; font-weight:900; margin-bottom:6px; }
    .quiz-opt { display:block; width:100%; padding:6px 10px; margin-bottom:3px; border:none; border-radius:4px; background:#334155; color:#e2e8f0; font-size:11px; text-align:left; cursor:pointer; }
    .quiz-opt:hover { background:#475569; }
    .quiz-opt.correct { background:#065f46; color:#4ecca3; }
    .quiz-opt.wrong { background:#7f1d1d; color:#ff4444; }
    .quiz-opt:disabled { cursor:default; opacity:0.7; }
    .quiz-result { font-size:12px; color:#ffd700; text-align:center; margin:8px 0; }
    .quiz-bonus { font-size:11px; color:#4ecca3; text-align:center; margin:4px 0; }

    /* SHOP UPGRADE MODAL */
    .su-overlay { display:none;position:absolute;inset:0;z-index:22;align-items:center;justify-content:center;background:rgba(0,0,0,0.7); }
    .su-overlay.show { display:flex; }
    .su-box { width:300px;padding:20px;border-radius:10px;background:#1e293b;border:2px solid #4ecca3;text-align:center; }
    .su-icon { font-size:40px;margin:6px 0; }
    .su-name { font-size:16px;color:#ffd700;font-weight:900; }
    .su-section { border-top:1px solid #334155;margin:10px 0;padding-top:10px; }
    .su-label { font-size:9px;color:#64748b;margin-bottom:2px; }
    .su-stat { font-size:11px;color:#e2e8f0; }
    .su-stat.next { color:#4ecca3; }
    .su-compare { display:flex;justify-content:space-around;gap:8px;margin:8px 0; }
    .su-compare-col { flex:1;padding:6px;background:#0f172a;border-radius:4px; }
    .su-compare-arrow { font-size:20px;color:#4ecca3;display:flex;align-items:center; }
    .su-cost { font-size:14px;color:#ffd700;font-weight:900;margin:6px 0; }
    .su-balance { font-size:10px;color:#94a3b8;font-family:monospace; }
    .su-btns { display:flex;gap:10px;justify-content:center;margin-top:10px; }
    .su-btn { padding:8px 24px;border:none;border-radius:6px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit; }
    .su-btn:hover { filter:brightness(1.15); }
    .su-btn.cancel { background:#475569;color:#fff; }
    .su-btn.confirm { background:#4ecca3;color:#000; }
  </style>

<body>
  <div id="app">
    <!-- Phaser 画布容器 -->
    <div id="phaser-container"></div>

    <!-- BOOT -->
    <div class="screen active" data-screen="boot" id="screen-boot">

          <span class="menu-card-sub">三十六海关</span>

    <!-- LEVEL SELECT (MAP) -->

    <!-- RESULT -->

        <div class="result-stat"><span class="result-stat-label">获功勋</span><span class="result-stat-value" id="result-dao" style="color:#ffd700">+0</span></div>

        <div class="result-stat"><span class="result-stat-label">错误</span><span class="result-stat-value" id="result-wrong" style="color:#ff4444">0</span></div>
        <div class="result-stat"><span class="result-stat-label">最高连击</span><span class="result-stat-value" id="result-combo" style="color:#ea80fc">0</span></div>
      </div>

      <div style="position:relative;width:300px;max-height:80%;overflow-y:auto;padding:14px;border-radius:8px;background:#1e293b;border:2px solid #ffd700;">
        <button id="tq-x" style="position:absolute;top:4px;right:10px;background:none;border:none;font-size:18px;color:#94a3b8;cursor:pointer;line-height:1;padding:4px;">✕</button>
        <div id="tutor-quiz-body"></div>
      </div>
    </div>

    <!-- KNOWLEDGE CARD -->

        <div style="font-size:14px;color:#00e5ff;font-weight:900;font-family:'Arial Black',sans-serif;margin-bottom:6px;">📋 缉私知识卡</div>
        <div id="kc-title" style="font-size:15px;color:#ffd700;font-weight:900;margin-bottom:6px;"></div>
        <div id="kc-desc" style="font-size:11px;color:#e2e8f0;line-height:1.6;text-align:left;white-space:pre-line;"></div>
        <div style="font-size:9px;color:#64748b;margin-top:10px;">点击继续</div>
      </div>
    </div>

        <div class="cs-info" id="cs-loss" style="color:#ff9100"></div>

        <span class="shop-tab" data-tab="skills">💪技能</span>
        <span class="shop-tab" data-tab="intuitions">🧠直觉</span>
        <span class="shop-tab" data-tab="knowledge">📚知识</span>

        <div id="am-desc"></div>
      </div>
      <div id="fc-container" style="display:none;"></div>
    </div>
  </div>
