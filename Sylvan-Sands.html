<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>林间秘境・沙海幻镜 (Optimized)</title>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Open+Sans:800&display=swap);

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            touch-action: none;
        }


        @media (max-width: 768px) {
            .back-btn {
                top: 70px;
                right: 16px;
                width: 38px;
                height: 38px;
            }

            .back-btn svg {
                width: 16px;
                height: 16px;
            }

            #instructions {
                bottom: 40px;
                left: 20px;
                font-size: 0.85em;
            }
        }

        html,
        body {
            overflow: hidden;
            background: #000;
        }

        .webgl {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            outline: none;
            background-color: #000000;
            cursor: grab;
            cursor: -moz-grab;
            cursor: -webkit-grab;
            width: 100%;
            height: 100%;
        }

        .webgl:active {
            cursor: grabbing;
            cursor: -moz-grabbing;
            cursor: -webkit-grabbing;
        }

        #instructions {
            position: absolute;
            bottom: 60px;
            left: 30px;
            font-family: "Open Sans", sans-serif;
            color: #ffffff;
            font-size: 1em;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }

        #instructions.hidden {
            opacity: 0;
        }

        /* 性能监控面板 */
        #perf-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 4px;
            z-index: 1000;
            pointer-events: none;
            line-height: 1.5;
        }

        /* 加载动画 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-ring-inner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
            position: absolute;
        }

        .loader-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #fff;
            font-family: "Open Sans", sans-serif;
            font-size: 1.2em;
            margin-top: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .loading-subtext {
            color: rgba(255, 255, 255, 0.4);
            font-family: "Open Sans", sans-serif;
            font-size: 0.85em;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .loading-progress {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.3));
            border-radius: 1px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .loading-percent {
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            font-size: 0.8em;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* 传送门脉冲效果 */
        .portal-pulse {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
    </style>
    <base target="_blank">
</head>

<body>

    <canvas class="webgl"></canvas>
    <!-- 加载画面 -->
    <div id="loading-screen">
        <div class="loader-container">
            <div class="portal-pulse"></div>
            <div class="loader-ring"></div>
            <div class="loader-ring-inner"></div>
        </div>
        <div class="loading-text">正在构建世界</div>
        <div class="loading-subtext">加载模型与纹理资源中...</div>
        <div class="loading-progress">
            <div class="loading-progress-bar" id="loading-bar"></div>
        </div>
        <div class="loading-percent" id="loading-percent">0%</div>
    </div>

    <div id="instructions">滑动屏幕旋转视角<br />双指缩放画面<br />点击传送门进行探索</div>
    <div id="perf-panel" style="display: none;">
        FPS: <span id="fps">0</span> |
        DrawCalls: <span id="drawcalls">0</span> |
        Triangles: <span id="triangles">0</span> |
        Textures: <span id="textures">0</span>
    </div>

    <script type="x-shader/x-fragment" id="fragmentShader">
        #define PI 3.1415
        #define TAU 6.2832
        uniform sampler2D map;
        uniform sampler2D noiseMap;
        uniform float time;
        uniform float effectIntensity;
        uniform float effectMultiplier;
        varying vec2 vUv;

        void main() {
            vec2 vUv2 = vUv - .5; 
            float angle = atan(vUv2.y, vUv2.x); 
            float l = length(vUv2); 
            float l2 = pow(l, .5);

            float u = angle * 2. / TAU + time * .1;
            float v = fract(l + time * .2);
            vec4 noise = texture2D(noiseMap, vec2(u, v));

            float noiseDisp = noise.r * noise.g * 4. * effectMultiplier;
            float radialMask = l;
            float wavesCount = 5.0;
            float wavesSpeed = time * 5.;
            float pnt = sin(2.0 * l * PI * wavesCount + noiseDisp + wavesSpeed) * radialMask;

            float dx = pnt * cos(angle);
            float dy = pnt * sin(angle);

            vec4 color = texture2D(map, vUv + vec2(dx,dy) * l * .3 * effectIntensity * effectMultiplier);
            color *= 1. + pnt * .5 * effectIntensity;

            float highlight = smoothstep(.0, .2, dx * dy);
            color += highlight * effectIntensity;

            float grey = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            color.rgb = mix(color.rgb, vec3(grey), effectIntensity * l * effectMultiplier);

            color.r += smoothstep(.1, .7, l) * .5 * effectIntensity;

            gl_FragColor = color;
        }
    </script>
    <script type="x-shader/x-vertex" id="vertexShader">
        precision highp float;
        varying vec2 vUv;
        void main() {
            vUv = uv;
            vec4 modelViewPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * modelViewPosition; 
        }
    </script>

    <script type="module">
        import * as THREE from "https://esm.sh/three@0.164.0";
        import { OrbitControls } from "https://esm.sh/three@0.164.0/examples/jsm/controls/OrbitControls.js";
        import { GLTFLoader } from "https://esm.sh/three@0.164.0/examples/jsm/loaders/GLTFLoader";
        import * as CameraUtils from "https://esm.sh/three@0.164.0/examples/jsm/utils/CameraUtils";
        import { gsap, Power4 } from "https://esm.sh/gsap";
        import { EventEmitter } from "https://esm.sh/events";

        const FILES = {
            desertFile: "https://assets.codepen.io/264161/desert33.glb",
            forestFile: "https://assets.codepen.io/264161/forest33.glb",
            noiseFile: "https://assets.codepen.io/264161/noise_1.jpg"
        };
        const ASSETS = {};

        // 性能配置
        const PERF_CONFIG = {
            enableStats: false,          // 按 ~ 键切换
            targetFPS: 60,
            adaptiveQuality: true,       // 自适应画质
            maxPixelRatio: 2,            // 限制最大像素比
            renderTargetScale: 1,        // 根据性能动态调整
        };

        document.addEventListener("DOMContentLoaded", () => new App());


        class LoadingManager {
            constructor() {
                this.screen = document.getElementById("loading-screen");
                this.bar = document.getElementById("loading-bar");
                this.percent = document.getElementById("loading-percent");
                this.subtext = document.querySelector(".loading-subtext");
                this.currentProgress = 0;
            }

            updateProgress(percent) {
                this.currentProgress = percent;
                if (this.bar) {
                    this.bar.style.width = percent + "%";
                }
                if (this.percent) {
                    this.percent.textContent = Math.round(percent) + "%";
                }

                // 根据进度更新提示文字
                if (this.subtext) {
                    if (percent < 30) {
                        this.subtext.textContent = "正在加载沙漠场景...";
                    } else if (percent < 60) {
                        this.subtext.textContent = "正在加载森林场景...";
                    } else if (percent < 90) {
                        this.subtext.textContent = "正在生成纹理贴图...";
                    } else {
                        this.subtext.textContent = "即将完成...";
                    }
                }
            }

            hide() {
                if (this.screen) {
                    this.screen.classList.add("hidden");
                }
            }

            showError(message) {
                if (this.subtext) {
                    this.subtext.textContent = message;
                    this.subtext.style.color = "#ff6b6b";
                }
                if (this.bar) {
                    this.bar.style.background = "#ff6b6b";
                }
            }
        }
        class App {
            constructor() {
                this.winWidth = window.innerWidth;
                this.winHeight = window.innerHeight;
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2();
                this.clock = new THREE.Clock();
                this.time = 0;
                this.deltaTime = 0;
                this.isInTransition = false;
                this.portalHover = false;

                // 性能监控
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 60;
                this.raycastThrottle = false;  // 射线检测节流

                // 缓存向量避免 GC
                this._cachedDir = new THREE.Vector3();
                this._cachedPos = new THREE.Vector3();

                this.loadAssets();
            }

            async loadAssets() {
                this.loadingManager = new LoadingManager();

                try {
                    ASSETS.desertScene = await this.loadModel(FILES.desertFile);
                    this.loadingManager.updateProgress(40);

                    ASSETS.forestScene = await this.loadModel(FILES.forestFile);
                    this.loadingManager.updateProgress(75);

                    ASSETS.noiseMap = await this.loadTexture(FILES.noiseFile);
                    this.loadingManager.updateProgress(100);

                    // 短暂延迟让用户看到 100%
                    setTimeout(() => {
                        this.loadingManager.hide();
                        this.initApp();
                    }, 500);
                } catch (error) {
                    console.error("资源加载失败:", error);
                    this.loadingManager.showError("资源加载失败，请刷新页面重试");
                }
            }

            loadModel(file) {
                const loaderModel = new GLTFLoader();
                return new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error("模型加载超时"));
                    }, 30000);  // 30秒超时

                    loaderModel.load(file, (gltf) => {
                        clearTimeout(timeout);
                        // 优化模型：遍历并设置 frustumCulled
                        gltf.scene.traverse((child) => {
                            if (child.isMesh) {
                                child.frustumCulled = true;
                                // 确保 bounding box 正确
                                if (!child.geometry.boundingBox) {
                                    child.geometry.computeBoundingBox();
                                }
                            }
                        });
                        resolve(gltf.scene);
                    }, undefined, (error) => {
                        clearTimeout(timeout);
                        reject(error);
                    });
                });
            }

            loadTexture(file) {
                const textureLoader = new THREE.TextureLoader();
                return new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error("纹理加载超时"));
                    }, 20000);  // 20秒超时

                    textureLoader.load(file, (texture) => {
                        clearTimeout(timeout);
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                        // 限制纹理尺寸，避免移动端内存爆炸
                        const maxSize = 1024;
                        if (texture.image && (texture.image.width > maxSize || texture.image.height > maxSize)) {
                            texture.minFilter = THREE.LinearMipmapLinearFilter;
                            texture.generateMipmaps = true;
                        }
                        resolve(texture);
                    }, undefined, (error) => {
                        clearTimeout(timeout);
                        reject(error);
                    });
                });
            }

            initApp() {
                this.createWorlds();
                this.createRenderer();
                this.createControls();
                this.createListeners();
                this.onWindowResize();
                this.setupPerformanceMonitor();
                this.loop();
            }

            createWorlds() {
                this.desertWorld = new World(ASSETS.desertScene, "desert", this);
                this.forestWorld = new World(ASSETS.forestScene, "forest", this);

                this.desertWorld.addListener("moveToPortalComplete", () =>
                    this.onMoveToPortalComplete()
                );
                this.forestWorld.addListener("moveToPortalComplete", () =>
                    this.onMoveToPortalComplete()
                );
                this.desertWorld.addListener("moveToOriginComplete", () =>
                    this.onMoveToOriginComplete()
                );
                this.forestWorld.addListener("moveToOriginComplete", () =>
                    this.onMoveToOriginComplete()
                );

                this.currentWorld = this.forestWorld;
                this.otherWorld = this.desertWorld;

                this.desertWorld.setTransitionTransforms(
                    this.forestWorld.portalWorldStart,
                    this.forestWorld.portalWorldEnd
                );
                this.forestWorld.setTransitionTransforms(
                    this.desertWorld.portalWorldStart,
                    this.desertWorld.portalWorldEnd
                );

                this.otherWorld.placeToStart();
                this.currentWorld.reset();
            }

            switchWorlds() {
                // 释放旧世界的 RenderTarget
                if (this.otherWorld.portal && this.otherWorld.portal.renderTarget) {
                    this.otherWorld.portal.renderTarget.dispose();
                }

                const w = this.otherWorld;
                this.otherWorld = this.currentWorld;
                this.currentWorld = w;

                this.otherWorld.placeToStart();
                this.currentWorld.reset();
                this.onWindowResize();
            }

            moveCameraToPortal() {
                this.isInTransition = true;
                this.controls.enabled = false;
                this.currentWorld.moveCameraToPortal();
                this.otherWorld.moveWorldToEnd();
            }

            onMoveToPortalComplete() {
                this.switchWorlds();
                this.currentWorld.moveWorldAndCameraToOrigin();
            }

            onMoveToOriginComplete() {
                this.controls.object = this.currentWorld.camera;
                this.controls.target = this.currentWorld.cameraTarget.position;
                this.isInTransition = false;
                this.controls.enabled = true;

                // 过渡完成后更新 portal 角点
                this.currentWorld.portal.updateCorners();
            }

            createRenderer() {
                const canvas = document.querySelector("canvas.webgl");

                // 根据设备性能调整像素比
                const pixelRatio = Math.min(window.devicePixelRatio, PERF_CONFIG.maxPixelRatio);

                this.renderer = new THREE.WebGLRenderer({
                    canvas,
                    alpha: true,
                    antialias: pixelRatio < 2,  // 高像素比设备关闭原生抗锯齿
                    preserveDrawingBuffer: false,  // 不需要截图时关闭
                    powerPreference: "high-performance"
                });

                this.renderer.setPixelRatio(pixelRatio);
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;  // 更高效的色调映射
                this.renderer.toneMappingExposure = 1.0;
                this.renderer.localClippingEnabled = true;

                // 输出渲染器信息
                console.log("Renderer created:", {
                    pixelRatio,
                    antialias: pixelRatio < 2,
                    maxTextureSize: this.renderer.capabilities.maxTextureSize
                });
            }

            createControls() {
                this.controls = new OrbitControls(
                    this.currentWorld.camera,
                    this.renderer.domElement
                );
                this.controls.minDistance = 0;
                this.controls.maxDistance = 50;
                this.controls.maxPolarAngle = Math.PI / 2 + 0.1;
                this.controls.enabled = true;
                this.controls.enableDamping = true;  // 启用阻尼，减少不必要的渲染
                this.controls.dampingFactor = 0.05;
            }

            createListeners() {
                window.addEventListener("resize", this.onWindowResize.bind(this));

                // 鼠标事件使用被动监听器
                document.addEventListener("mousemove", this.onMouseMove.bind(this), { passive: true });
                document.addEventListener("touchmove", this.onTouchMove.bind(this), { passive: false });
                document.addEventListener("mousedown", this.onMouseDown.bind(this), { passive: true });

                // 隐藏说明文字
                setTimeout(() => {
                    const instructions = document.getElementById("instructions");
                    if (instructions) instructions.classList.add("hidden");
                }, 8000);

                // 性能监控快捷键
                document.addEventListener("keydown", (e) => {
                    if (e.key === "~" || e.key === "`") {
                        PERF_CONFIG.enableStats = !PERF_CONFIG.enableStats;
                        document.getElementById("perf-panel").style.display =
                            PERF_CONFIG.enableStats ? "block" : "none";
                    }
                });

                // 网络状态监听
                window.addEventListener("offline", () => {
                    console.warn("网络已断开");
                    if (this.loadingManager && !this.loadingManager.screen.classList.contains("hidden")) {
                        this.loadingManager.showError("网络已断开，请检查网络连接");
                    }
                });
            }

            setupPerformanceMonitor() {
                this.perfElements = {
                    fps: document.getElementById("fps"),
                    drawcalls: document.getElementById("drawcalls"),
                    triangles: document.getElementById("triangles"),
                    textures: document.getElementById("textures")
                };
            }

            loop() {
                this.deltaTime = this.clock.getDelta();
                this.time += this.deltaTime;

                this.currentWorld.portal.loop(this.deltaTime);
                this.render();

                if (this.controls && this.controls.enabled) {
                    this.controls.update();
                }

                // 仅在非过渡状态时同步相机
                if (!this.isInTransition) {
                    this.syncCameras();
                }

                this.updatePerformanceStats();

                requestAnimationFrame(this.loop.bind(this));
            }

            render() {
                // 仅在 portal 角点需要更新时计算（过渡期间或首次渲染）
                if (this.isInTransition || this.currentWorld.portal.needsCornerUpdate) {
                    this.currentWorld.portal.updateCorners();
                    this.currentWorld.portal.needsCornerUpdate = false;
                }

                const { bottomLeft, bottomRight, topLeft } = this.currentWorld.portal.corners;
                CameraUtils.frameCorners(this.otherWorld.camera, bottomLeft, bottomRight, topLeft, false);

                const currentRenderTarget = this.renderer.getRenderTarget();

                // 根据性能动态调整 RenderTarget 尺寸
                const rtScale = PERF_CONFIG.renderTargetScale;
                const rtWidth = Math.floor(2048 * rtScale);
                const rtHeight = Math.floor(2048 * rtScale);

                if (this.currentWorld.portal.renderTarget.width !== rtWidth ||
                    this.currentWorld.portal.renderTarget.height !== rtHeight) {
                    this.currentWorld.portal.renderTarget.setSize(rtWidth, rtHeight);
                }

                this.renderer.setRenderTarget(this.currentWorld.portal.renderTarget);
                this.renderer.render(this.otherWorld.scene, this.otherWorld.camera);
                this.renderer.setRenderTarget(currentRenderTarget);
                this.renderer.render(this.currentWorld.scene, this.currentWorld.camera);
            }

            syncCameras() {
                // 使用缓存向量避免创建新对象
                this.otherWorld.camera.position.copy(this.currentWorld.camera.position);
                this.otherWorld.camera.quaternion.copy(this.currentWorld.camera.quaternion);
                this.otherWorld.cameraTarget.position.copy(
                    this.currentWorld.cameraTarget.position
                );
            }

            raycast() {
                // 节流：每 100ms 最多执行一次
                if (this.raycastThrottle) return;
                this.raycastThrottle = true;
                setTimeout(() => { this.raycastThrottle = false; }, 100);

                this.raycaster.setFromCamera(this.mouse, this.currentWorld.camera);
                const intersects = this.raycaster.intersectObjects([
                    this.currentWorld.portalPlane
                ], false);  // false = 不递归检测子对象

                if (intersects.length > 0) {
                    this.currentWorld.portal.effectMultiplier = 2;
                    this.portalHover = true;
                } else {
                    this.currentWorld.portal.effectMultiplier = 1;
                    this.portalHover = false;
                }
            }

            updatePerformanceStats() {
                this.frameCount++;
                const now = performance.now();

                if (now - this.lastTime >= 1000) {
                    this.fps = Math.round(this.frameCount * 1000 / (now - this.lastTime));
                    this.frameCount = 0;
                    this.lastTime = now;

                    // 自适应画质调整
                    if (PERF_CONFIG.adaptiveQuality) {
                        this.adjustQuality();
                    }

                    // 更新监控面板
                    if (PERF_CONFIG.enableStats && this.perfElements.fps) {
                        const info = this.renderer.info;
                        this.perfElements.fps.textContent = this.fps;
                        this.perfElements.drawcalls.textContent = info.render.calls;
                        this.perfElements.triangles.textContent = info.render.triangles;
                        this.perfElements.textures.textContent = info.memory.textures;
                    }
                }
            }

            adjustQuality() {
                // 根据 FPS 动态调整 RenderTarget 分辨率
                if (this.fps < 30 && PERF_CONFIG.renderTargetScale > 0.5) {
                    PERF_CONFIG.renderTargetScale -= 0.1;
                    console.log("Performance low, reducing RT scale to:", PERF_CONFIG.renderTargetScale);
                } else if (this.fps > 55 && PERF_CONFIG.renderTargetScale < 1.0) {
                    PERF_CONFIG.renderTargetScale += 0.05;
                    console.log("Performance good, increasing RT scale to:", PERF_CONFIG.renderTargetScale);
                }
            }

            onWindowResize() {
                this.winWidth = window.innerWidth;
                this.winHeight = window.innerHeight;
                this.renderer.setSize(this.winWidth, this.winHeight);
                this.currentWorld.camera.aspect = this.winWidth / this.winHeight;
                this.currentWorld.camera.updateProjectionMatrix();

                // 标记需要更新 portal 角点
                this.currentWorld.portal.needsCornerUpdate = true;
            }

            onMouseDown(event) {
                if (this.portalHover && !this.isInTransition) this.moveCameraToPortal();
            }

            onMouseMove(event) {
                const x = (event.clientX / this.winWidth) * 2 - 1;
                const y = -((event.clientY / this.winHeight) * 2 - 1);
                this.updateMouse(x, y);
                this.raycast();
            }

            onTouchMove(event) {
                if (event.touches.length == 1) {
                    event.preventDefault();
                    const x = (event.touches[0].pageX / this.winWidth) * 2 - 1;
                    const y = -((event.touches[0].pageY / this.winHeight) * 2 - 1);
                    this.updateMouse(x, y);
                    this.raycast();
                }
            }

            updateMouse(x, y) {
                this.mouse.x = x;
                this.mouse.y = y;
            }
        }

        class World extends EventEmitter {
            constructor(scene, name, app) {
                super();
                this.scene = scene;
                this.name = name;
                this.app = app;
                this.camera = new THREE.PerspectiveCamera(60, app.winWidth / app.winHeight, 0.1, 150);
                this.camera.position.set(0, 0, 30);
                this.scene.add(this.camera);

                this.transitionDuration = 1.5;
                this.processModel();
            }

            processModel() {
                this.holder = this.scene.getObjectByName("holder");
                this.portalPlane = this.scene.getObjectByName("portal");
                this.portal = new Portal(this.portalPlane);

                this.portalWorldStart = this.scene.getObjectByName("portalWorldStart");
                this.portalWorldEnd = this.scene.getObjectByName("portalWorldEnd");

                this.cameraTarget = new THREE.Object3D();
            }

            setTransitionTransforms(startObject, endObject) {
                this.startPosition = startObject.position.clone();
                this.startScale = startObject.scale.clone();
                this.startQuaternion = startObject.quaternion.clone();

                this.endPosition = endObject.position.clone();
                this.endScale = endObject.scale.clone();
                this.endQuaternion = endObject.quaternion.clone();
            }

            reset() {
                this.holder.position.set(0, 0, 0);
                this.holder.scale.set(1, 1, 1);
                this.holder.quaternion.identity();
            }

            placeToStart() {
                this.holder.position.copy(this.startPosition);
                this.holder.scale.copy(this.startScale);
                this.holder.quaternion.copy(this.startQuaternion);
            }

            moveWorldToEnd() {
                const duration = this.transitionDuration;
                const ease = Power4.easeIn;

                gsap.to(this.holder.position, {
                    duration,
                    ease,
                    x: this.endPosition.x,
                    y: this.endPosition.y,
                    z: this.endPosition.z
                });

                gsap.to(this.holder.scale, {
                    duration,
                    ease,
                    x: this.endScale.x,
                    y: this.endScale.y,
                    z: this.endScale.z
                });

                gsap.to(this.holder.quaternion, {
                    duration,
                    ease,
                    x: this.endQuaternion.x,
                    y: this.endQuaternion.y,
                    z: this.endQuaternion.z,
                    w: this.endQuaternion.w
                });
            }

            moveWorldAndCameraToOrigin() {
                const duration = this.transitionDuration;
                const ease = Power4.easeOut;

                gsap.to(this.holder.position, {
                    duration,
                    ease,
                    x: 0,
                    y: 0,
                    z: 0
                });

                gsap.to(this.holder.scale, {
                    duration,
                    ease,
                    x: 1,
                    y: 1,
                    z: 1
                });

                gsap.to(this.holder.quaternion, {
                    duration,
                    ease,
                    x: 0,
                    y: 0,
                    z: 0,
                    w: 1
                });

                gsap.to(this.cameraTarget.position, {
                    duration,
                    ease,
                    x: 0,
                    y: 0,
                    z: 0
                });

                gsap.to(this.camera.position, {
                    duration,
                    ease,
                    x: 0,
                    y: 0,
                    z: 40,
                    onUpdate: () => {
                        this.camera.lookAt(this.cameraTarget.position);
                    },
                    onComplete: () => {
                        this.emit("moveToOriginComplete");
                    }
                });
            }

            moveCameraToPortal() {
                const duration = this.transitionDuration;
                const ease = Power4.easeIn;

                const dir = new THREE.Vector3();
                this.portalPlane.getWorldDirection(dir);
                const pos = this.portalPlane.position.clone().add(dir.multiplyScalar(3));

                gsap.to(this.cameraTarget.position, {
                    duration,
                    ease,
                    x: this.portalWorldEnd.position.x,
                    y: this.portalWorldEnd.position.y,
                    z: this.portalWorldEnd.position.z
                });

                gsap.to(this.camera.position, {
                    duration,
                    ease,
                    x: pos.x,
                    y: pos.y,
                    z: pos.z,
                    onUpdate: () => {
                        this.camera.lookAt(this.cameraTarget.position);
                    },
                    onComplete: () => {
                        this.emit("moveToPortalComplete");
                    }
                });

                gsap.to(this.portal, {
                    duration,
                    ease: Power4.easeIn,
                    effectIntensity: 0,
                    onComplete: () => {
                        this.portal.effectIntensity = 1;
                    }
                });
            }
        }

        class Portal {
            constructor(plane) {
                this.plane = plane;
                this._effectIntensity = 1;
                this._effectMultiplier = 1;
                this.time = 0;
                this.needsCornerUpdate = true;  // 标记是否需要更新角点

                const fragmentShader = document.getElementById("fragmentShader").textContent;
                const vertexShader = document.getElementById("vertexShader").textContent;

                // 根据设备性能调整 RenderTarget 尺寸
                const rtSize = Math.min(2048, window.innerWidth * window.devicePixelRatio);

                this.renderTarget = new THREE.WebGLRenderTarget(rtSize, rtSize, {
                    type: THREE.HalfFloatType,
                    minFilter: THREE.LinearFilter,
                    magFilter: THREE.LinearFilter,
                    format: THREE.RGBAFormat
                });

                this.plane.material = new THREE.ShaderMaterial({
                    uniforms: {
                        map: { value: this.renderTarget.texture },
                        noiseMap: { value: ASSETS.noiseMap },
                        time: { value: 0 },
                        effectIntensity: { value: this.effectIntensity },
                        effectMultiplier: { value: this.effectMultiplier }
                    },
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader
                });

                this.corners = {
                    bottomLeft: new THREE.Vector3(),
                    bottomRight: new THREE.Vector3(),
                    topLeft: new THREE.Vector3()
                };
            }

            updateCorners() {
                const { min, max } = this.plane.geometry.boundingBox;
                this.plane.localToWorld(this.corners.bottomLeft.set(min.x, min.y, 0));
                this.plane.localToWorld(this.corners.bottomRight.set(max.x, min.y, 0));
                this.plane.localToWorld(this.corners.topLeft.set(min.x, max.y, 0));
            }

            set effectIntensity(v) {
                this._effectIntensity = v;
                this.plane.material.uniforms.effectIntensity.value = this._effectIntensity;
            }

            get effectIntensity() {
                return this._effectIntensity;
            }

            set effectMultiplier(v) {
                if (v == this._effectMultiplier) return;
                this._effectMultiplier = v;

                gsap.to(this.plane.material.uniforms.effectMultiplier, {
                    duration: 1,
                    ease: Power4.easeOut,
                    value: v
                });
            }

            get effectMultiplier() {
                return this._effectMultiplier;
            }

            loop(deltaTime) {
                this.time += deltaTime * this.effectMultiplier;
                this.plane.material.uniforms.time.value = this.time;
            }

            dispose() {
                if (this.renderTarget) {
                    this.renderTarget.dispose();
                    this.renderTarget = null;
                }
            }
        }
    </script>
