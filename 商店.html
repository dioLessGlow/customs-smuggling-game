<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>街角商店动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #A0EDF7;
        }

        .scene {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 800px;
            height: 600px;
            margin-left: -400px;
            margin-top: -300px;
        }

        @media screen and (max-width: 768px) {
            .scene {
                transform: scale(0.5);
                margin-left: -400px;
                margin-top: -300px;
            }
        }

        @media screen and (max-width: 400px) {
            .scene {
                transform: scale(0.4);
                margin-left: -400px;
                margin-top: -300px;
            }
        }

        .cloud {
            position: absolute;
        }

        .cloud1 {
            left: 100px;
            top: 130px;
        }

        .cloud2 {
            left: 600px;
            top: 230px;
        }

        .cloud ul {
            list-style: none;
        }

        .cloud ul li {
            background: #fff;
            float: left;
            border-radius: 50%;
            border-right: 14px solid #F7E7EB;
            margin-left: -20px;
            opacity: 0;
            transform: rotate(65deg);
            animation: cloud 0.3s 1.4s linear forwards;
        }

        .cloud ul li:first-child {
            width: 46px;
            height: 60px;
            margin-left: 30px;
            margin-top: -20px;
        }

        .cloud ul li:nth-child(2) {
            width: 26px;
            height: 40px;
            margin-left: -82px;
        }

        .cloud ul li:nth-child(3) {
            width: 56px;
            height: 70px;
            margin-left: -20px;
            margin-top: -30px;
        }

        .cloud ul li:nth-child(4) {
            width: 26px;
            height: 40px;
            margin-left: -20px;
        }

        .floor {
            position: absolute;
            width: 0;
            height: 0;
            background: #868994;
            bottom: 40px;
            left: 50%;
            z-index: 5;
            animation: floor 0.3s 0.3s linear forwards;
        }

        .road {
            position: absolute;
            width: 0;
            height: 0;
            background: #636272;
            bottom: 40px;
            left: 50%;
            z-index: 5;
            animation: road 0.3s linear forwards;
        }

        .kerb {
            position: absolute;
            width: 0;
            height: 0;
            background: #B2B2B2;
            bottom: 45px;
            left: 50%;
            z-index: 5;
            animation: kerb 0.3s 0.3s linear forwards;
        }

        .kerb .right {
            position: absolute;
            width: 0;
            height: 12px;
            background: #969798;
            bottom: 0;
            right: 0;
            animation: kerb-right 0.2s 0.4s linear forwards;
        }

        .kerb .left {
            position: absolute;
            width: 0;
            height: 12px;
            background: #C4D1CF;
            bottom: 0;
            left: 0;
            animation: kerb-left 0.4s 0.6s linear forwards;
        }

        .store-floor {
            position: absolute;
            width: 0;
            height: 60px;
            background: #A24549;
            bottom: 0;
            left: 0;
            z-index: 5;
            box-shadow: 0 -5px 0 #BE6151;
            animation: store-floor 0.3s 0.7s linear forwards;
        }

        .store-wall {
            position: absolute;
            width: 0;
            height: 60px;
            background: #FFEFD3;
            bottom: 0;
            left: 0;
            animation: store-wall 0.4s 0.9s linear forwards;
        }

        .store-inner-wall {
            position: absolute;
            width: 0;
            height: 60px;
            background: #CF595D;
            bottom: 0;
            left: 0;
            z-index: 4;
            box-shadow: inset 3px 0 0 rgba(0, 0, 0, 0.1),
                inset 3px 5px 0 rgba(0, 0, 0, 0.2);
            animation: store-inner-wall 0.4s 0.9s linear forwards;
        }

        .store-frame {
            position: absolute;
            width: 400px;
            height: 30px;
            background: #FFEFD3;
            bottom: 330px;
            left: calc(50% - 150px);
            z-index: 5;
            opacity: 0;
            animation: store-frame 0.2s 1.1s linear forwards;
        }

        .store-frame-shadow {
            position: absolute;
            width: 380px;
            height: 36px;
            background: rgba(0, 0, 0, 0.2);
            bottom: 330px;
            left: calc(50% - 140px);
            z-index: 5;
            opacity: 0;
            animation: store-frame-shadow 0.3s 1.0s linear forwards;
        }

        .store-sign {
            position: absolute;
            width: 140px;
            height: 0;
            background: #FFFF8A;
            bottom: 345px;
            left: calc(50% - 30px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            z-index: 6;
            opacity: 0;
            animation: store-sign 0.2s 1.3s linear forwards;
            color: rgba(0, 0, 0, 0.5);
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            line-height: 26px;
            padding: 0 10px;
            letter-spacing: 2px;
        }

        .store-door {
            position: absolute;
            width: 75px;
            height: 0;
            background: linear-gradient(135deg, #9ecfd7 0%, #9ecfd7 6%, #aedbdf 7%, #aedbdf 10%, #9ecfd7 10%, #9ecfd7 22%, #aedbdf 22%, #aedbdf 33%, #9ecfd7 33%, #9ecfd7 40%, #aedbdf 40%, #aedbdf 42%, #9ecfd7 42%, #9ecfd7 76%, #aedbdf 76%, #aedbdf 87%, #9ecfd7 87%);
            border: 10px solid #FFFFF3;
            bottom: 57px;
            left: calc(50% + 95px);
            z-index: 6;
            opacity: 0;
            animation: store-door 0.2s 1.3s linear forwards;
            box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.2);
            padding: 10px;
        }

        .store-door::after {
            content: '';
            position: absolute;
            top: 46%;
            left: -5px;
            width: 110px;
            height: 20px;
            background: #FFEFD3;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }

        .store-door::before {
            content: '';
            position: absolute;
            top: 92px;
            z-index: 10;
            left: 2px;
            width: 30px;
            height: 3px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }

        .store-window {
            position: absolute;
            width: 160px;
            height: 0;
            background: linear-gradient(135deg, #9ecfd7 0%, #9ecfd7 6%, #aedbdf 7%, #aedbdf 10%, #9ecfd7 10%, #9ecfd7 22%, #aedbdf 22%, #aedbdf 33%, #9ecfd7 33%, #9ecfd7 40%, #aedbdf 40%, #aedbdf 42%, #9ecfd7 42%, #9ecfd7 76%, #aedbdf 76%, #aedbdf 87%, #9ecfd7 87%);
            border: 3px solid #FFFFF3;
            bottom: 116px;
            left: calc(50% - 110px);
            z-index: 6;
            opacity: 0;
            animation: store-window 0.2s 1.3s linear forwards;
            box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.2);
            padding: 10px;
        }

        .store-roof-opening {
            position: absolute;
            width: 216px;
            height: 9px;
            background: #FFEFD3;
            bottom: 280px;
            left: calc(50% - 120px);
            z-index: 5;
            opacity: 0;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            animation: store-roof-opening 0.2s 1.3s linear forwards;
        }

        .store-roof {
            position: absolute;
            bottom: 100px;
            left: calc(50% - 115px);
            height: 200px;
            width: 340px;
            z-index: 12;
        }

        .store-roof ul {
            list-style: none;
            float: left;
        }

        .store-roof ul li {
            width: 35px;
            height: 100px;
            opacity: 0;
            float: left;
            background: #EB6159;
            transform: skew(-25deg) rotateX(45deg);
            animation: store-roof 0.2s 1.5s linear forwards;
        }

        .store-roof ul li:nth-child(2n) {
            background: #FFFBF1;
        }

        .store-roof ul li:nth-child(2n)::after {
            background: #F7F7F7;
        }

        .store-roof ul li::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 10px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
        }

        .store-roof ul li::after {
            content: '';
            position: absolute;
            top: 93px;
            left: 5px;
            width: 35px;
            height: 45px;
            box-shadow: 0 7px 0 rgba(0, 0, 0, 0.2);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            background: #DF5551;
            transform: skew(18deg) rotateX(-45deg);
        }

        .sign {
            position: absolute;
            bottom: 180px;
            left: calc(50% + 120px);
            width: 60px;
            border-radius: 2px;
            z-index: 12;
            height: 13px;
            background: #FFFFF3;
            text-align: center;
            color: #99AA61;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
            font-size: 10px;
            font-weight: bold;
            line-height: 13px;
            padding: 0;
            opacity: 0;
            animation: sign 0.7s 1.8s linear forwards;
            letter-spacing: 1px;
        }

        .sign::after {
            content: '';
            width: 1px;
            height: 35px;
            background: #aaa;
            position: absolute;
            top: -30px;
            left: 21px;
            transform: rotate(45deg);
        }

        .sign::before {
            content: '';
            width: 1px;
            height: 35px;
            background: #aaa;
            position: absolute;
            top: -30px;
            right: 21px;
            transform: rotate(-45deg);
        }

        @keyframes floor {
            0% {
                width: 0;
                height: 0;
            }

            100% {
                width: 100%;
                height: 40px;
                left: 0;
                bottom: 0;
            }
        }

        @keyframes road {
            0% {
                width: 0;
                height: 0;
            }

            100% {
                width: 100%;
                height: 5px;
                left: 0;
                bottom: 40px;
            }
        }

        @keyframes kerb {
            0% {
                width: 0;
                height: 12px;
                left: 50%;
            }

            50% {
                width: 275px;
                height: 12px;
                left: 50%;
            }

            100% {
                width: 500px;
                height: 12px;
                left: calc(50% - 225px);
                bottom: 45px;
            }
        }

        @keyframes kerb-right {
            0% {
                width: 0;
            }

            100% {
                width: 90px;
                right: -40px;
            }
        }

        @keyframes kerb-left {
            0% {
                width: 0;
            }

            50% {
                width: 90px;
            }

            100% {
                width: 70px;
                left: 0;
            }
        }

        @keyframes store-floor {
            0% {
                width: 0;
                height: 0;
                left: 50%;
            }

            50% {
                width: 400px;
                height: 65px;
                bottom: 40px;
                left: calc(50% - 150px);
            }

            100% {
                width: 400px;
                height: 50px;
                bottom: 35px;
                left: calc(50% - 150px);
            }
        }

        @keyframes store-wall {
            0% {
                width: 0;
                height: 0;
                left: 50%;
            }

            50% {
                width: 380px;
                height: 345px;
                bottom: 40px;
                left: calc(50% - 140px);
            }

            100% {
                width: 380px;
                height: 310px;
                bottom: 35px;
                left: calc(50% - 140px);
            }
        }

        @keyframes store-inner-wall {
            0% {
                width: 0;
                height: 0;
                left: 50%;
            }

            50% {
                width: 360px;
                height: 300px;
                bottom: 40px;
                left: calc(50% - 130px);
            }

            100% {
                width: 360px;
                height: 280px;
                bottom: 35px;
                left: calc(50% - 130px);
            }
        }

        @keyframes store-frame {
            0% {
                opacity: 0;
                bottom: 350px;
            }

            1% {
                opacity: 1;
            }

            100% {
                opacity: 1;
                bottom: 330px;
            }
        }

        @keyframes store-frame-shadow {
            0% {
                opacity: 0;
                bottom: 324px;
            }

            1% {
                opacity: 0;
            }

            100% {
                opacity: 1;
                bottom: 324px;
            }
        }

        @keyframes store-sign {
            0% {
                opacity: 0;
                bottom: 354px;
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 1;
                bottom: 354px;
                height: 26px;
            }
        }

        @keyframes store-door {
            0% {
                opacity: 0;
                height: 0;
            }

            1% {
                opacity: 1;
            }

            50% {
                opacity: 1;
                height: 180px;
            }

            100% {
                opacity: 1;
                height: 160px;
            }
        }

        @keyframes store-window {
            0% {
                opacity: 0;
                height: 0;
            }

            1% {
                opacity: 1;
            }

            50% {
                opacity: 1;
                height: 160px;
            }

            100% {
                opacity: 1;
                height: 116px;
            }
        }

        @keyframes store-roof-opening {
            0% {
                opacity: 0;
                height: 0;
            }

            1% {
                opacity: 1;
            }

            50% {
                opacity: 1;
                bottom: 300px;
            }

            100% {
                opacity: 1;
                bottom: 280px;
            }
        }

        @keyframes store-roof {
            0% {
                opacity: 0;
                height: 0;
            }

            1% {
                opacity: 1;
            }

            50% {
                opacity: 1;
                height: 100px;
            }

            100% {
                opacity: 1;
                bottom: 100px;
            }
        }

        @keyframes sign {
            0% {
                opacity: 0;
                bottom: 200px;
            }

            1% {
                opacity: 1;
            }

            5% {
                bottom: 180px;
            }

            30% {
                opacity: 1;
                transform-origin: 50% -26px;
                transform: rotate(35deg);
            }

            60% {
                opacity: 1;
                transform-origin: 50% -26px;
                transform: rotate(-30deg);
            }

            100% {
                opacity: 1;
                transform-origin: 50% -26px;
                transform: rotate(0deg);
            }
        }

        @keyframes cloud {
            0% {
                opacity: 0;
            }

            50% {
                opacity: 1;
                transform: scale(2) rotate(65deg);
            }

            100% {
                opacity: 1;
                transform: scale(1) rotate(65deg);
            }
        }
    </style>
</head>

<body>
    <div class="scene">
        <div class="cloud cloud1">
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>

        <div class="cloud cloud2">
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>

        <div class="sign">营业中</div>

        <div class="store-roof">
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>

        <div class="store-roof-opening"></div>
        <div class="store-window"></div>
        <div class="store-door"></div>
        <div class="store-sign">我的小店</div>
        <div class="store-frame-shadow"></div>
        <div class="store-frame"></div>
        <div class="store-inner-wall"></div>
        <div class="store-wall"></div>
        <div class="store-floor"></div>

        <div class="kerb">
            <div class="left"></div>
            <div class="right"></div>
        </div>
        <div class="road"></div>
        <div class="floor"></div>
    </div>
</body>

</html>
