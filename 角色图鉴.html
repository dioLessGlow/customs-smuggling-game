<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色图鉴</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060e1f;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            padding: 0;
            overflow-x: hidden;
        }

        .hsr-wrap {
            width: 100%;
            background: linear-gradient(135deg, #0a1628 0%, #0d2044 50%, #0a1628 100%);
            overflow: hidden;
            position: relative;
            min-height: 100vh;
        }

        .hsr-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(0, 200, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 120, 255, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .hsr-wrap>* {
            position: relative;
            z-index: 1;
        }

        /* 顶部标题栏 */
        .hsr-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 16px 0;
        }

        .hsr-logo-box {
            background: linear-gradient(135deg, #1a3a6e, #0d2044);
            border: 1.5px solid #2a5aaa;
            border-radius: 10px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .hsr-eyebrow {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #4ab3e0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hsr-eyebrow::after {
            content: '▶▶▶';
            font-size: 7px;
            color: #2a6aaa;
        }

        .hsr-main-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #e8f4ff;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        /* 横向滚动标签栏 */
        .hsr-tabs-row {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }

        .hsr-tabs-row::-webkit-scrollbar {
            display: none;
        }

        .hsr-tab {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: 1.5px solid #2a5aaa;
            background: rgba(20, 40, 80, 0.8);
            color: #a8d0f0;
            transition: all 0.18s ease;
            white-space: nowrap;
            user-select: none;
            flex-shrink: 0;
            text-align: center;
        }

        .hsr-tab:hover:not(.active) {
            background: rgba(40, 80, 160, 0.6);
            color: #d0eaff;
            border-color: #4a8adc;
        }

        .hsr-tab.active {
            background: linear-gradient(135deg, #00d4a0, #00b886);
            color: #002a1a;
            border-color: #00e8b0;
        }

        /* 角色选择器（横向滚动头像） */
        .hsr-char-selector {
            padding: 0 16px 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }

        .hsr-char-selector::-webkit-scrollbar {
            display: none;
        }

        .hsr-char-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px;
            border-radius: 10px;
            border: 2px solid transparent;
            transition: all 0.16s ease;
            flex-shrink: 0;
            min-width: 64px;
        }

        .hsr-char-avatar:hover {
            background: rgba(30, 70, 140, 0.35);
        }

        .hsr-char-avatar.active {
            background: linear-gradient(135deg, rgba(0, 200, 160, 0.18), rgba(0, 150, 120, 0.08));
            border-color: #00d4a0;
        }

        .hsr-char-avatar .avatar-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(30, 60, 120, 0.6);
            border: 1.5px solid #2a5aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
            background-size: cover;
            background-position: center top;
        }

        .hsr-char-avatar.active .avatar-circle {
            border-color: #00d4a0;
            background-color: rgba(0, 160, 120, 0.2);
            box-shadow: 0 0 12px rgba(0, 212, 160, 0.3);
        }

        .hsr-char-avatar .avatar-name {
            font-size: 11px;
            font-weight: 600;
            color: #7ab0d8;
            white-space: nowrap;
        }

        .hsr-char-avatar.active .avatar-name {
            color: #00d4a0;
            font-weight: 700;
        }

        /* 主内容区 */
        .hsr-body {
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 角色卡片 */
        .hsr-event-card {
            display: flex;
            flex-direction: column;
            background: rgba(12, 24, 52, 0.7);
            border: 1px solid #1e4a8a;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .hsr-event-card:hover {
            border-color: #3a8acc;
            background: rgba(16, 34, 72, 0.85);
        }

        .card-header {
            display: flex;
            align-items: stretch;
            min-height: 120px;
        }

        .hsr-event-num {
            width: 40px;
            min-width: 40px;
            background: rgba(8, 18, 40, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #4ab3e0;
            border-right: 1px solid #1e4a8a;
        }

        .hsr-event-num span {
            font-size: 9px;
            color: #2a6aaa;
            letter-spacing: 1px;
        }

        .hsr-event-img {
            width: 100px;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            background-size: cover;
            background-position: center top;
        }

        .char-avatar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }

        .char-avatar.has-image {
            display: none;
        }

        .char-rarity {
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 9px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 5px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.6);
            color: #f0c040;
        }

        .hsr-event-info {
            flex: 1;
            padding: 10px 12px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .char-name-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .char-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #e8f4ff;
        }

        .char-title {
            font-size: 10px;
            color: #4ab3e0;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .char-tags {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .char-tag {
            font-size: 9px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 7px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tag-path {
            background: rgba(74, 60, 180, 0.3);
            color: #a090ff;
            border: 1px solid rgba(100, 80, 220, 0.4);
        }

        .char-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            min-width: 60px;
            flex: 1;
        }

        .stat-label {
            font-size: 9px;
            color: #3a6aaa;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Rajdhani', sans-serif;
            margin-bottom: 2px;
        }

        .stat-bar-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-bar {
            flex: 1;
            height: 4px;
            background: rgba(30, 60, 120, 0.5);
            border-radius: 2px;
            overflow: hidden;
            min-width: 40px;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 2px;
        }

        .stat-val {
            font-size: 10px;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            color: #a8d0f0;
            min-width: 20px;
        }

        .char-desc {
            font-size: 12px;
            color: #5a8ab0;
            line-height: 1.5;
            padding: 10px 12px;
            border-top: 1px solid rgba(30, 74, 138, 0.3);
            background: rgba(8, 18, 40, 0.3);
        }

        .card-action-btn {
            display: flex;
            justify-content: center;
            padding: 0 12px 12px;
        }

        .hsr-event-btn {
            width: 100%;
            padding: 10px 0;
            background: linear-gradient(135deg, #e8930a, #d47800);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.16s ease;
            text-align: center;
        }

        .hsr-event-btn:hover {
            background: linear-gradient(135deg, #f9a020, #e88800);
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(230, 140, 0, 0.35);
        }

        /* 养成进度卡 */
        .dev-card-body {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dev-card-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .dev-section-label {
            font-size: 9px;
            color: #3a6aaa;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Rajdhani', sans-serif;
            margin-bottom: 4px;
        }

        .dev-value {
            font-size: 12px;
            color: #a8d0f0;
            font-weight: 600;
        }

        .eidolon-pips {
            display: flex;
            gap: 4px;
        }

        .eidolon-pip {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
        }

        .eidolon-pip.unlocked {
            border: 1.5px solid #00d4a0;
            background: rgba(0, 180, 130, 0.25);
            color: #00d4a0;
        }

        .eidolon-pip.locked {
            border: 1.5px solid #1e4a8a;
            background: rgba(10, 20, 45, 0.6);
            color: #2a5aaa;
        }

        .trace-pips {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-wrap: wrap;
        }

        .trace-pip {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .trace-pip.unlocked {
            background: rgba(74, 179, 224, 0.4);
            border: 1px solid #4ab3e0;
        }

        .trace-pip.locked {
            background: rgba(10, 20, 45, 0.6);
            border: 1px solid #1e4a8a;
        }

        .trace-count {
            font-size: 10px;
            color: #4ab3e0;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            margin-left: 4px;
        }

        .prog-bar-wrap {
            width: 100%;
        }

        .prog-bar-track {
            height: 6px;
            background: rgba(30, 60, 120, 0.4);
            border-radius: 3px;
            overflow: hidden;
        }

        .prog-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4a0, #4ab3e0);
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .prog-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        .prog-label {
            font-size: 9px;
            color: #3a6aaa;
        }

        .prog-label.center {
            color: #4ab3e0;
            font-weight: 700;
        }

        .hsr-footnote {
            text-align: center;
            padding: 8px 16px 20px;
            font-size: 10px;
            color: #3a6aaa;
            font-style: italic;
        }

        /* 小屏优化 */
        @media (max-width: 360px) {
            .hsr-event-img {
                width: 80px;
                min-width: 80px;
            }

            .char-name {
                font-size: 16px;
            }

            .stat-item {
                min-width: 50px;
            }

            .eidolon-pip {
                width: 20px;
                height: 20px;
            }
        }
    </style>

<body>


    <div class="hsr-wrap">
        <div class="hsr-header">
            <div class="hsr-logo-box">
                <svg viewBox="0 0 36 36" fill="none" width="32" height="32">
                    <circle cx="18" cy="18" r="14" fill="#0d2a50" stroke="#2a6aaa" stroke-width="1.5" />

        <div class="hsr-tabs-row" id="regionTabs">
            <button class="hsr-tab active" data-region="HUNT" onclick="switchRegion('HUNT', this)">巡猎</button>
            <button class="hsr-tab" data-region="ERUDITION" onclick="switchRegion('ERUDITION', this)">智识</button>
            <button class="hsr-tab" data-region="HARMONY" onclick="switchRegion('HARMONY', this)">同谐</button>
            <button class="hsr-tab" data-region="NIHILITY" onclick="switchRegion('NIHILITY', this)">虚无</button>
            <button class="hsr-tab" data-region="DESTRUCTION" onclick="switchRegion('DESTRUCTION', this)">毁灭</button>
        </div>

        <!-- 横向滚动角色头像选择器 -->
        <div class="hsr-char-selector" id="charSelector"></div>

        <div class="hsr-body">
            <div class="hsr-events" id="eventList"></div>
        </div>

        <p class="hsr-footnote">* 角色数据反映当前开拓等级进度</p>

            风: '#00d4a0',

            量子: '135deg, #2a0a5a, #0a1628',
            风: '135deg, #0a3a2a, #0a1628',
            火: '135deg, #5a1a0a, #0a1628',
            雷: '135deg, #1a1a5a, #0a1628',
            冰: '135deg, #0a2a4a, #0a1628',

            虚数: '135deg, #3a2a0a, #0a1628'
        };

        let currentRegion = 'HUNT';
        let currentCountry = '希儿';

        function switchRegion(region, btn) {
            currentRegion = region;
            currentCountry = paths[region].members[0];

            document.querySelectorAll('.hsr-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            renderCharSelector();
            renderEvents();
        }

        function switchCountry(name) {
            currentCountry = name;
            document.querySelectorAll('.hsr-char-avatar').forEach(c => c.classList.remove('active'));
            const el = document.querySelector(`[data-char="${name}"]`);
            if (el) el.classList.add('active');
            renderEvents();
        }

        function renderCharSelector() {
            const data = paths[currentRegion];
            const list = document.getElementById('charSelector');

            list.innerHTML = data.members.map(name => {
                const char = data.chars[name];
                const active = name === currentCountry ? ' active' : '';

                let dotStyle = '';
                let dotInner = `<span style="font-size:18px;">${char.emoji}</span>`;

                if (char.thumb) {
                    dotStyle = `background-image: url('${char.thumb}'); background-size: cover; background-position: center top;`;
                    dotInner = '';
                }

                return `
      <div class="hsr-char-avatar${active}" data-char="${name.replace(/'/g, "\'")}" onclick="switchCountry('${name.replace(/'/g, "\'")}')">
        <div class="avatar-circle" style="${dotStyle}">${dotInner}</div>
        <span class="avatar-name">${name}</span>
      </div>`;
            }).join('');
        }

        function renderEvents() {
            const char = paths[currentRegion].chars[currentCountry];
            if (!char) return;

            const ec = elemColor[char.element] || '#4ab3e0';
            const grad = gradMap[char.element] || '135deg, #1a2a4a, #0a1628';
            const prog = Math.round((char.eidolons / 6 * 0.5 + char.traces / 10 * 0.5) * 100);

            const portraitBg = char.portrait ? `background-image: url('${char.portrait}');` : '';
            const avatarHidden = char.portrait ? ' has-image' : '';

            const statsHTML = char.stats.map(s => `
    <div class="stat-item">
      <span class="stat-label">${s.l}</span>
      <div class="stat-bar-wrap">
        <div class="stat-bar">
          <div class="stat-bar-fill" style="width:${s.v}%; background:${s.c};"></div>
        </div>
        <span class="stat-val">${s.v}</span>
      </div>
    </div>`).join('');

            const eidolonPips = [1, 2, 3, 4, 5, 6].map(i => {
                const cls = i <= char.eidolons ? 'unlocked' : 'locked';
                return `<div class="eidolon-pip ${cls}">${i}</div>`;
            }).join('');

            const tracePips = Array.from({ length: 10 }, (_, i) => {
                const cls = i < char.traces ? 'unlocked' : 'locked';
                return `<div class="trace-pip ${cls}"></div>`;
            }).join('');

            document.getElementById('eventList').innerHTML = `
    <!-- 角色档案卡 -->
    <div class="hsr-event-card">
      <div class="card-header">
        <div class="hsr-event-num">
          <span>编号</span>${char.num}
        </div>

        <div class="hsr-event-img"
             style="background: linear-gradient(${grad}); ${portraitBg}">
          <div class="char-avatar${avatarHidden}">${char.emoji}</div>
          <div class="char-rarity">${char.rarity}</div>
        </div>

        <div class="hsr-event-info">
          <div class="char-name-row">
            <p class="char-name">${currentCountry}</p>
            <span class="char-title">${char.title}</span>
          </div>

          <div class="char-tags">

            <span class="char-tag"

            <span class="char-tag"

        </div>

        </div>
      </div>

      <div class="card-action-btn">
        <button class="hsr-event-btn">配装指南</button>
      </div>
    </div>`;
        }
